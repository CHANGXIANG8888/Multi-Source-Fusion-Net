# MSF-Net configuration
# Used for all main experiments reported in Tables 3, 4, 5.

model:
  d_model: 128
  dropout: 0.1

  path_a:                                  # Demand-temporal encoder
    n_layers: 6
    kernel_size: 3
    dilation_factors: [1, 2, 4, 8, 16, 32]
    sparse_top_p: 0.25

  path_b:                                  # Weather-supply encoder
    n_layers: 2
    n_heads: 4
    d_ff: 256

  path_c:                                  # Promotion-context encoder
    hidden_size: 64
    n_layers: 2

  gate:                                    # Adaptive Seasonal Gate
    context_dim: 16
    hidden_dim: 64

  fusion:                                  # Cross-Path Attention Fusion
    n_heads: 4
    d_ff: 256

input:
  window_length: 30                        # T = 30 days
  horizon: 7                               # H = 7 days
  feature_dims:
    d_a: 13
    d_b: 8
    d_c: 4

loss:
  alpha_over: 1.47                         # Calibrated cross-SKU mean
  alpha_under: 1.0
  quantile_levels: [0.10, 0.50, 0.90]

training:
  optimizer: adamw
  learning_rate: 1.0e-3
  weight_decay: 1.0e-4
  scheduler: cosine_annealing
  max_epochs: 200
  batch_size: 32
  early_stopping_patience: 15              # Stop if val MAE doesn't improve for 15 epochs
  n_seeds: 5
  seeds: [42, 123, 456, 789, 1024]

evaluation:
  metrics: [MAE, RMSE, MASE, sMAPE, Winkler, PCM]
  mase_seasonal_period: 7
  significance_test: diebold_mariano
  alpha: 0.05
